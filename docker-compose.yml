version: '3.8'

networks:
  nextbike-net:
    driver: bridge

services:
  # ─── Zookeeper ───────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: nextbike-zookeeper
    networks: [nextbike-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    healthcheck:
      test: ['CMD', 'bash', '-c', 'echo "ruok" | nc localhost 2181']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka Broker ─────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: nextbike-kafka
    networks: [nextbike-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'
      - '29092:29092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:9092']
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Kafka UI ─────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nextbike-kafka-ui
    networks: [nextbike-net]
    depends_on: [kafka]
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: nextbike
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─── Backend (NestJS) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextbike-backend
    networks: [nextbike-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      KAFKA_BROKERS: kafka:29092
      KAFKA_GROUP_ID: nextbike-group
    volumes:
      - ./backend/src:/app/src
    restart: unless-stopped

  # ─── Frontend (React) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextbike-frontend
    networks: [nextbike-net]
    depends_on: [backend]
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API_URL: http://localhost:3001
      REACT_APP_WS_URL: ws://localhost:3001
    restart: unless-stopped
